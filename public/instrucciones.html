<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instrucciones TFE — UNIR</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #8b5cf6;
    --accent2: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
  }

  /* ── Menú lateral ── */
  .menu {
    width: 340px;
    flex-shrink: 0;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .menu-header {
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .menu-header h1 {
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: .25rem;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .menu-header p {
    font-size: .82rem;
    color: var(--muted);
    line-height: 1.45;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: .5rem;
    padding: .6rem 1.5rem;
    font-size: .8rem;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    transition: all .15s;
  }
  .back-btn:hover { color: var(--accent); background: rgba(255,255,255,.03); }
  .menu-items {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .cat-label {
    padding: .5rem 1.5rem;
    font-size: .65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    background: rgba(255,255,255,.02);
    border-bottom: 1px solid var(--border);
  }
  .menu-btn {
    display: flex;
    align-items: center;
    gap: .75rem;
    width: 100%;
    padding: .7rem 1.5rem;
    border: none;
    background: none;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    border-bottom: 1px solid rgba(255,255,255,.04);
    transition: all .12s;
    font-family: inherit;
  }
  .menu-btn:hover { background: rgba(255,255,255,.05); }
  .menu-btn.active {
    background: rgba(139,92,246,.12);
    border-left: 4px solid var(--accent);
  }
  .menu-btn .btn-num {
    width: 26px; height: 26px;
    border-radius: 7px;
    background: rgba(255,255,255,.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .75rem;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    transition: all .12s;
  }
  .menu-btn.active .btn-num {
    background: var(--accent);
    color: white;
  }
  .menu-btn .btn-text { flex: 1; min-width: 0; }
  .menu-btn .btn-name {
    font-size: .88rem;
    font-weight: 600;
    display: block;
    line-height: 1.3;
  }
  .menu-btn .btn-sub {
    font-size: .68rem;
    color: var(--muted);
    display: block;
    line-height: 1.3;
    margin-top: .1rem;
  }
  .menu-btn .btn-arrow {
    color: var(--muted);
    font-size: .8rem;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity .1s;
  }
  .menu-btn:hover .btn-arrow,
  .menu-btn.active .btn-arrow { opacity: 1; }

  .menu-download {
    padding: .6rem 1.5rem;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .menu-download a {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    padding: .5rem;
    background: rgba(255,255,255,.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    text-decoration: none;
    font-size: .78rem;
    font-weight: 500;
    transition: all .12s;
  }
  .menu-download a:hover {
    background: rgba(255,255,255,.1);
    color: var(--text);
  }

  /* ── Panel lateral ── */
  .panel {
    flex: 1;
    display: none;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
    animation: slideIn .25s ease;
  }
  body.panel-open .panel { display: flex; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .panel-header {
    padding: 1.25rem 2.5rem .75rem;
    flex-shrink: 0;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .panel-header h2 { font-size: 1.6rem; font-weight: 800; }
  .panel-header .p-cat {
    font-size: .8rem;
    color: var(--muted);
    margin-left: auto;
  }
  .panel-header .close-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .1s;
    font-family: inherit;
    flex-shrink: 0;
  }
  .panel-header .close-btn:hover { background: rgba(255,255,255,.08); color: white; }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 2.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* Content blocks */
  .block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.5rem;
  }
  .block h3 {
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: .5rem;
    color: var(--accent2);
  }
  .block p, .block li {
    font-size: 1rem;
    color: #cbd5e1;
    line-height: 1.7;
  }
  .block ul, .block ol {
    padding-left: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: .35rem;
  }
  .block li::marker { color: var(--accent); }

  .block-tip {
    background: rgba(139,92,246,.08);
    border-left: 4px solid var(--accent);
  }
  .block-tip p { color: #c4b5fd; }

  .block-warn {
    background: rgba(245,158,11,.08);
    border-left: 4px solid #f59e0b;
  }
  .block-warn p { color: #fcd34d; }

  .block-format {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: .35rem 1rem;
  }
  .block-format dt {
    font-size: .95rem;
    font-weight: 600;
    color: var(--accent2);
  }
  .block-format dd {
    font-size: .95rem;
    color: #cbd5e1;
  }

  /* Headings as separators don't flex-grow */
  .block-heading {
    background: transparent;
    border: none;
    padding: .35rem 0 0;
    flex: 0;
  }

  .panel-footer {
    flex-shrink: 0;
    padding: .5rem 2.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--border);
  }
  .panel-nav {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: .3rem .7rem;
    border-radius: 6px;
    font-size: .8rem;
    cursor: pointer;
    transition: all .1s;
    font-family: inherit;
  }
  .panel-nav:hover { background: rgba(255,255,255,.06); color: white; }
  .panel-nav:disabled { opacity: .2; cursor: default; }
  .panel-nav:disabled:hover { background: none; color: var(--muted); }
  .panel-counter { font-size: .75rem; color: var(--muted); }

  .tag {
    display: inline-block;
    font-size: .65rem;
    font-weight: 600;
    padding: .1rem .4rem;
    border-radius: 4px;
    background: rgba(139,92,246,.15);
    color: var(--accent2);
    margin-left: .5rem;
    vertical-align: middle;
  }

  .hamburger { display: none; }

  /* ── Responsive: mobile & tablet ── */
  @media (max-width: 768px) {
    html, body { height: auto; overflow: auto; }
    body { flex-direction: column; height: auto; }
    .hamburger {
      display: flex; position: fixed; top: 1rem; left: 1rem; z-index: 1000;
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      width: 44px; height: 44px; border-radius: 10px;
      align-items: center; justify-content: center; font-size: 1.3rem;
      cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.3);
    }
    .menu {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 999; transform: translateX(-100%); transition: transform .25s ease;
      border-right: none;
    }
    .menu.open { transform: translateX(0); }
    .panel { width: 100%; height: auto; overflow: auto; padding-top: 4rem; }
    .panel-body { overflow-y: visible; }
  }
</style>
</head>
<body>
<button class="hamburger" id="hamburger" aria-label="Abrir men&uacute;">&#9776;</button>
<div class="menu" id="menu"></div>
<div class="panel" id="panel"></div>

      {

          ]},
          { type: "h3", text: "Planteamiento del problema" },
          { type: "ul", items: [

            "Dedica un apartado a <strong>líneas de trabajo futuro</strong>: perspectivas que abre tu trabajo, en qué campos puede emplearse"
          ]},
          { type: "warn", text: "Las conclusiones deben ser <strong>consecuencia del trabajo realizado</strong> y marcar el grado de consecución de cada objetivo propuesto." }
        ]
      },
      {
        name: "Referencias bibliográficas",
        sub: "Formato APA, variedad de fuentes y herramientas de búsqueda",
        content: [
          { type: "ul", items: [
            "Usa un <strong>gestor bibliográfico</strong> (Endnote, Refworks, Mendeley) con formato APA",
            "Comprueba que aparecen <strong>todas las referencias citadas</strong> en el texto",
            "Autores ordenados <strong>alfabéticamente</strong> por apellidos",
            "Cursivas, páginas, años y ciudades de edición correctos",
            "<strong>Evita citas a Wikipedia</strong>",
            "Variedad de fuentes: libros, artículos de congreso, revistas y enlaces puntuales"
          ]},
          { type: "h3", text: "Herramientas de búsqueda" },
          { type: "ul", items: [
            "<strong>Google Scholar</strong>, Mendeley, ResearchGate — mejor que Google genérico",
            "Dialnet (Universidad de La Rioja)",
            "ERIC (Education Resources Information Center)",
            "Biblioteca UCM (CompluDoc)",
            "Repositorio Universidad de Salamanca (GREDOS)",
            "Latindex (bases de datos iberoamericanas)",
            "TESEO (tesis doctorales)"
          ]},
          { type: "tip", text: "Busca con calma, contrasta fuentes. Construye un buen registro de lo que consultas: autor, página, URL y fecha de consulta." }
        ]
      },
      {
        name: "Anexos e índice de acrónimos",
        sub: "Material complementario que no es esencial en el cuerpo del trabajo",
        content: [
          { type: "h3", text: "Anexos" },
          { type: "ul", items: [
            "Contenido complementario: encuestas, resultados de pilotos, capturas, código…",
            "Se numeran con letra: <strong>Anexo A, Anexo B…</strong> (cada uno en página diferente)",
            "<strong>No computan</strong> en la extensión del trabajo"
          ]},
          { type: "h3", text: "Anexo A — Código fuente y datos" },
          { type: "ul", items: [
            "Incluye la <strong>URL del repositorio</strong> con el código fuente",
            "Debes ser el <strong>único autor</strong> y propietario del repositorio",
            "No debe haber commits de otros usuarios",
            "Si es proyecto de empresa, justifica la confidencialidad"
          ]},
          { type: "h3", text: "Índice de acrónimos" },
          { type: "p", text: "Apartado <strong>opcional</strong> donde se listan los acrónimos utilizados a lo largo del trabajo." }
        ]
      }
    ]
  }
];

let active = null;
let flat = [];

function init() {
  flat = [];
  DATA.forEach(cat => {
    cat.items.forEach(item => {
      flat.push({ cat: cat.cat, ref: item });
    });
  });
  render();
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { active = null; render(); }
    if (active !== null) {
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); nav(1); }
      if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); nav(-1); }
    }
  });
}

function render() {
  renderMenu();
  renderPanel();
  document.body.classList.toggle('panel-open', active !== null);
}

function renderMenu() {
  const m = document.getElementById('menu');
  m.innerHTML = '';

  const hdr = document.createElement('div');
  hdr.className = 'menu-header';
  hdr.innerHTML = `<h1>Instrucciones TFE</h1><p>Máster en Inteligencia Artificial — UNIR<br>Guía de consulta rápida para estudiantes</p>`;
  m.appendChild(hdr);

  const backBtn = document.createElement('a');
  backBtn.href = '/';
  backBtn.className = 'back-btn';
  backBtn.innerHTML = '&#8592; Volver a las guías';
  m.appendChild(backBtn);

  const wrap = document.createElement('div');
  wrap.className = 'menu-items';

  let lastCat = '';
  let gi = 0;
  DATA.forEach(cat => {
    cat.items.forEach((item, i) => {
      const idx = gi++;
      if (cat.cat !== lastCat) {
        lastCat = cat.cat;
        const cl = document.createElement('div');
        cl.className = 'cat-label';
        cl.textContent = cat.cat;
        wrap.appendChild(cl);
      }
      const btn = document.createElement('button');
      btn.className = 'menu-btn' + (active === idx ? ' active' : '');
      btn.onclick = () => { active = (active === idx ? null : idx); render(); document.getElementById('menu').classList.remove('open'); };
      btn.innerHTML = `
        <span class="btn-num">${idx + 1}</span>
        <span class="btn-text">
          <span class="btn-name">${item.name}</span>
          <span class="btn-sub">${item.sub}</span>
        </span>
        <span class="btn-arrow">&rarr;</span>
      `;
      wrap.appendChild(btn);
    });
  });
  m.appendChild(wrap);

  const dl = document.createElement('div');
  dl.className = 'menu-download';
  dl.innerHTML = `<a href="instrucciones.pdf" download="instrucciones.pdf" target="_blank">&#8615; Descargar instrucciones original (PDF)</a>`;
  m.appendChild(dl);
}

function renderPanel() {
  const p = document.getElementById('panel');
  if (active === null) { p.innerHTML = ''; return; }

  const f = flat[active];
  const item = f.ref;

  let bodyHTML = '';
  for (const block of item.content) {
    if (block.type === 'p') {
      bodyHTML += `<div class="block"><p>${block.text}</p></div>`;
    } else if (block.type === 'h3') {
      bodyHTML += `<div class="block block-heading"><h3>${block.text}</h3></div>`;
    } else if (block.type === 'ul') {
      bodyHTML += `<div class="block"><ul>${block.items.map(i => `<li>${i}</li>`).join('')}</ul></div>`;
    } else if (block.type === 'ol') {
      bodyHTML += `<div class="block"><ol>${block.items.map(i => `<li>${i}</li>`).join('')}</ol></div>`;
    } else if (block.type === 'tip') {
      bodyHTML += `<div class="block block-tip"><p>${block.text}</p></div>`;
    } else if (block.type === 'warn') {
      bodyHTML += `<div class="block block-warn"><p>${block.text}</p></div>`;
    } else if (block.type === 'format') {
      bodyHTML += `<div class="block"><dl class="block-format">${block.items.map(([k,v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('')}</dl></div>`;
    }
  }

  p.innerHTML = `
    <div class="panel-header">
      <h2>${item.name}</h2>
      <span class="p-cat">${f.cat}</span>
      <button class="close-btn" onclick="active=null;render()">&times;</button>
    </div>
    <div class="panel-body">${bodyHTML}</div>
    <div class="panel-footer">
      <button class="panel-nav" onclick="nav(-1)" ${active <= 0 ? 'disabled' : ''}>&larr; Anterior</button>
      <span class="panel-counter">${active + 1} / ${flat.length}</span>
      <button class="panel-nav" onclick="nav(1)" ${active >= flat.length - 1 ? 'disabled' : ''}>Siguiente &rarr;</button>
    </div>
  `;
}

function nav(dir) {
  const next = active + dir;
  if (next >= 0 && next < flat.length) {
    active = next;
    render();
  }
}

init();
document.getElementById('hamburger').addEventListener('click', () => document.getElementById('menu').classList.toggle('open'));
</script>
</body>
</html>
